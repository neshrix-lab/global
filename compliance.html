    + '<div class="tm-sugg" id="tmSugg"></div>'
    + '<div class="tm-foot"><div class="tm-inrow"><input id="tmIn" placeholder="Спросите Trademan…" aria-label="Сообщение"><button class="tm-send" id="tmSend" aria-label="Отправить">→</button></div><div class="tm-disc">Прототип · имитация. Готовит черновики — подтверждаете вы.</div></div>';
  document.body.appendChild(launch); document.body.appendChild(panel);

  var body = panel.querySelector("#tmBody"), sugg = panel.querySelector("#tmSugg"), input = panel.querySelector("#tmIn");
  function render() {
    body.innerHTML = msgs.map(function (m) {
      if (m.r === "typing") return '<div class="tm-typing">Trademan печатает…</div>';
      return '<div class="tm-msg tm-' + m.r + '">' + esc(m.t) + '</div>';
    }).join("");
    body.scrollTop = body.scrollHeight;
  }
  function renderSugg() { sugg.innerHTML = suggestions.map(function (s) { return '<button class="tm-sg">' + esc(s) + '</button>'; }).join(""); sugg.querySelectorAll(".tm-sg").forEach(function (b) { b.onclick = function () { send(b.textContent); }; }); }
  function send(text) {
    text = (text || input.value).trim(); if (!text) return; input.value = "";
    msgs.push({ r: "me", t: text }); msgs.push({ r: "typing" }); render();
    setTimeout(function () { msgs = msgs.filter(function (m) { return m.r !== "typing"; }); msgs.push({ r: "ai", t: reply(text) }); render(); }, 850);
  }
  function toggle(v) { open = v; panel.classList.toggle("open", open); if (open) setTimeout(function () { input.focus(); }, 300); }
  launch.onclick = function () { toggle(!open); };
  panel.querySelector(".x").onclick = function () { toggle(false); };
  panel.querySelector("#tmSend").onclick = function () { send(); };
  input.addEventListener("keydown", function (e) { if (e.key === "Enter") send(); });
  render(); renderSugg();
})();

</script>
</body>
</html>
