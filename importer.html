<style>

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.55}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  h2.sec{font-size:13px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:16px;font-weight:600}
  .topbar{background:var(--pine);color:#eef1ea}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand b{font-weight:800;letter-spacing:.02em;font-size:18px}
  .brand span{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:#9fb3a8;text-transform:uppercase}
  .back{font-family:var(--mono);font-size:12px;color:#c6d2ca;letter-spacing:.04em}
  .back:hover{color:#fff}
  /* Hero */
  .top{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#f6f8f3,var(--paper))}
  .top .wrap{padding:40px 24px;display:grid;grid-template-columns:1.6fr 1fr;gap:36px;align-items:start}
  .hname{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
  .hname h1{font-size:clamp(1.8rem,3.4vw,2.6rem);font-weight:800;letter-spacing:-.02em;line-height:1.05}
  .hname .loc{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:8px;letter-spacing:.03em}
  .seal-mark{flex-shrink:0;width:72px;height:72px;border-radius:50%;border:2px solid var(--seal);color:var(--seal);display:grid;place-items:center;text-align:center;font-family:var(--mono);font-size:9px;font-weight:600;line-height:1.25;letter-spacing:.06em;transform:rotate(-6deg)}
  .tagline{font-size:16px;color:var(--pine-mid);margin:16px 0 20px;font-weight:500}
  .spec-inline{display:flex;flex-wrap:wrap;gap:10px 22px;font-size:13px;color:var(--muted);border-top:1px solid var(--line);padding-top:18px}
  .spec-inline b{color:var(--ink);font-weight:600}
  .grade{font-family:var(--mono);font-weight:600;font-size:15px;padding:3px 9px;border-radius:6px;letter-spacing:.04em}
  .grade.aa{background:#e3ede7;color:var(--pine)} .grade.a{background:#eef2ea;color:var(--pine-mid)} .grade.bbb{background:#f3f0e6;color:var(--seal)}
  /* Action box (buy-box style) */
  .buybox{border:1px solid var(--line-strong);border-radius:14px;background:var(--card);padding:22px;position:sticky;top:20px}
  .buybox .scale .lbl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .buybox .scale .lbl span{font-size:12px;color:var(--muted)}
  .buybox .scale .lbl b{font-family:var(--mono);font-size:16px;color:var(--ink);font-weight:600}
  .buybox .scale .lbl b em{font-style:normal;font-size:11px;color:var(--muted);font-weight:400}
  .bar{height:8px;background:#eceee8;border-radius:4px;overflow:hidden;margin-bottom:18px}
  .bar>i{display:block;height:100%;background:var(--pine-mid);border-radius:4px}
  .buybox ul{list-style:none;font-size:13px;color:var(--muted);display:flex;flex-direction:column;gap:9px;margin:16px 0 20px}
  .buybox li{display:flex;align-items:flex-start;gap:8px}
  .buybox li svg{width:15px;height:15px;stroke:var(--pine-mid);flex-shrink:0;margin-top:2px}
  .btn{width:100%;height:48px;border-radius:var(--radius);font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--pine);background:var(--pine);color:#fff;transition:background .15s}
  .btn:hover{background:var(--pine-mid)}
  .btn:focus-visible{outline:2px solid var(--seal);outline-offset:2px}
  .buybox .note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5}

  section.blk{padding:44px 0;border-bottom:1px solid var(--line)}
  /* Gallery */
  .gallery{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:12px;height:340px}
  .ph{background:repeating-linear-gradient(135deg,#e9ede6,#e9ede6 12px,#e4e9e1 12px,#e4e9e1 24px);border:1px solid var(--line);border-radius:12px;position:relative;overflow:hidden;display:flex;align-items:flex-end}
  .ph:first-child{grid-row:1/3}

  .ph .ico{position:absolute;top:12px;left:12px;width:22px;height:22px;stroke:#9aa79d;opacity:.7}
  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}

  .stat .v{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--pine);letter-spacing:-.01em}
  .stat .v small{font-size:14px;color:var(--muted)}
  .stat .k{font-size:12px;color:var(--muted);margin-top:4px}

  .profile p.about{font-size:15px;color:var(--ink);line-height:1.7;margin-bottom:22px}
  .kv{display:flex;flex-direction:column;gap:14px}
  .kv .row{display:flex;justify-content:space-between;gap:16px;font-size:14px;border-bottom:1px dotted var(--line-strong);padding-bottom:12px}
  .kv .row span{color:var(--muted)}
  .kv .row b{color:var(--ink);font-weight:600;text-align:right}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--line-strong);color:var(--pine);background:#f7f9f5}

  .loc-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:28px;align-items:start}
  .loc-list{display:flex;flex-direction:column;gap:12px}
  .loc-item{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .loc-item svg{width:18px;height:18px;stroke:var(--seal);flex-shrink:0;margin-top:2px}
  .loc-item b{font-size:14px;font-weight:600;display:block}
  .loc-item span{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .map{background:#e7ece5;border:1px solid var(--line);border-radius:12px;height:100%;min-height:220px;position:relative;overflow:hidden}
  .map .grid-bg{position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:32px 32px;opacity:.5}
  .map .pin{position:absolute;width:12px;height:12px;background:var(--seal);border:2px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(176,116,31,.2)}
  .map .lbl{position:absolute;bottom:12px;left:14px;font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  /* Verification */
  .verify{background:var(--seal-soft);border:1px solid #e5d3a8;border-radius:14px;padding:26px}
  .verify h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--ink)}
  .verify>p{font-size:13px;color:#7a5c1f;margin-bottom:18px}
  .checks{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .check{display:flex;gap:10px;align-items:center;font-size:14px}
  .check svg{width:18px;height:18px;stroke:var(--seal);flex-shrink:0}
  @media (max-width:860px){.top .wrap{grid-template-columns:1fr}.buybox{position:static}.stats{grid-template-columns:repeat(2,1fr)}.profile,.loc-grid{grid-template-columns:1fr;gap:24px}.gallery{grid-template-columns:1fr 1fr;height:auto;grid-auto-rows:150px}.ph:first-child{grid-row:auto;grid-column:1/3}.checks{grid-template-columns:1fr}}

    setTimeout(function () { msgs = msgs.filter(function (m) { return m.r !== "typing"; }); msgs.push({ r: "ai", t: reply(text) }); render(); }, 850);
  }
  function toggle(v) { open = v; panel.classList.toggle("open", open); if (open) setTimeout(function () { input.focus(); }, 300); }
  launch.onclick = function () { toggle(!open); };
  panel.querySelector(".x").onclick = function () { toggle(false); };
  panel.querySelector("#tmSend").onclick = function () { send(); };
  input.addEventListener("keydown", function (e) { if (e.key === "Enter") send(); });
  render(); renderSugg();
})();
