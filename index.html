<script>
let scaleFilter = "all";
const grid = document.getElementById("grid");
const $q = document.getElementById("q"), $country = document.getElementById("country"),
  $category = document.getElementById("category"), $cold = document.getElementById("cold"), $sort = document.getElementById("sort");

[...new Set(IMPORTERS.map(i => i.country))].sort().forEach(c => {
  const o = document.createElement("option"); o.value = c; o.textContent = c; $country.appendChild(o);
});
document.querySelectorAll(".scale-seg button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".scale-seg button").forEach(x => x.setAttribute("aria-pressed", "false"));
  b.setAttribute("aria-pressed", "true"); scaleFilter = b.dataset.scale; render();
}));
[$q, $country, $category, $cold, $sort].forEach(el => el.addEventListener("input", render));
const esc = s => s.replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function render() {
  const q = $q.value.trim().toLowerCase();
  let list = IMPORTERS.filter(i => {
    if (q && !(i.name.toLowerCase().includes(q) || i.country.toLowerCase().includes(q) || i.city.toLowerCase().includes(q))) return false;
    if ($country.value && i.country !== $country.value) return false;
    if ($category.value && !i.cats.includes($category.value)) return false;
    if ($cold.value === "yes" && !i.cold) return false;
    if (scaleFilter !== "all" && tierOf(i.cap) !== scaleFilter) return false;
    return true;
  });
  list.sort((a, b) => $sort.value === "grade" ? GRADE_RANK[b.grade] - GRADE_RANK[a.grade] || b.cap - a.cap : b.cap - a.cap);

  document.getElementById("n").textContent = list.length;
  document.getElementById("nword").textContent = list.length === 1 ? "импортёр" : "импортёров";
  document.getElementById("scaleLabel").textContent = scaleFilter === "large" ? "крупный масштаб" : scaleFilter === "mid" ? "средний масштаб" : "все проверенные";

  if (!list.length) {
    grid.innerHTML = `<div class="empty"><h3>Под эти условия проверенных импортёров нет</h3><p>Ослабьте фильтры. Непроверенные и мелкие компании в выдачу не попадают — так и задумано.</p></div>`;
    return;
  }
  grid.innerHTML = list.map((i, idx) => {
    const pct = Math.round((i.cap / SCALE.MAX_CAP) * 100);
    const gradeCls = i.grade === "AA" ? "aa" : i.grade === "A" ? "a" : "bbb";
    const chips = i.cats.map(c => `<span class="chip">${esc(c)}</span>`).join("");
    const pay = i.pay.map(p => p === "Эскроу" ? `<span class="esc">${p}</span>` : p).join(" · ");
    const disp = i.disputes === 0 ? "0 споров" : `${i.disputes} спор`;
    return `
    <article class="card reveal" style="animation-delay:${Math.min(idx,8)*40}ms" tabindex="0" role="link"
      onclick="location.href='importer.html?id=${i.id}'"
      onkeydown="if(event.key==='Enter')location.href='importer.html?id=${i.id}'">
      <div class="card-top">
        <div><h2>${esc(i.name)}</h2><div class="loc">${esc(i.city)}, ${esc(i.country)} · ${i.iso}</div></div>
        <div class="seal-mark" title="Проверено Global Trade House">✓<br>GTH<br>KYB</div>
      </div>
      <div class="grade-row"><span class="grade ${gradeCls}">${i.grade}</span><small>надёжность · KYB, платежи, объёмы</small></div>
      <div class="scale"><div class="lbl"><span>Подтверждённый масштаб</span><b>${i.cap} <em>конт./мес</em></b></div><div class="bar"><i style="width:${pct}%"></i></div></div>
      <div class="chips">${chips}</div>
      <div class="meta"><span>Оплата: <b>${pay}</b></span><span>Холод. цепь: <b>${i.cold ? "да" : "нет"}</b></span><span>На рынке: <b>${i.years} лет</b></span><span><b>${disp}</b></span></div>
      <div class="actions"><a class="btn" href="deal-room.html?importer=${i.id}" onclick="event.stopPropagation()">Обсудить сделку →</a></div>
    </article>`;
  }).join("");
}
render();
</script>
