.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.sec-t{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:600;margin-bottom:16px}
.topbar{background:var(--pine);color:#eef1ea}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:60px;gap:20px}
.brand{display:flex;align-items:baseline;gap:12px}
.brand b{font-weight:800;letter-spacing:.02em;font-size:18px}
.brand span{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:#9fb3a8;text-transform:uppercase}
.nav{display:flex;gap:18px;margin-left:auto;font-size:13px}
.nav a{color:#c6d2ca}.nav a:hover,.nav a.active{color:#fff}
.who{display:flex;align-items:center;gap:10px;font-size:13px;color:#c6d2ca}
.who .avatar{width:30px;height:30px;border-radius:50%;background:var(--seal);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px}
.back{font-family:var(--mono);font-size:12px;color:#c6d2ca;letter-spacing:.04em}.back:hover{color:#fff}
.btn{height:44px;padding:0 18px;border-radius:var(--radius);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--pine);background:var(--pine);color:#fff;transition:background .15s,opacity .15s}
.btn:hover:not(:disabled){background:var(--pine-mid)}
.btn.ghost{background:transparent;color:var(--pine);border-color:var(--line-strong)}
.btn.ghost:hover{border-color:var(--pine-mid);background:#eef3ea}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:focus-visible{outline:2px solid var(--seal);outline-offset:2px}
.chip{font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--line-strong);color:var(--pine);background:#f7f9f5}
.grade{font-family:var(--mono);font-weight:600;font-size:14px;padding:2px 8px;border-radius:6px;letter-spacing:.04em}
.grade.aa{background:#e3ede7;color:var(--pine)}.grade.a{background:#eef2ea;color:var(--pine-mid)}.grade.bbb{background:#f3f0e6;color:var(--seal)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px}
.seal-mark{flex-shrink:0;border-radius:50%;border:1.5px solid var(--seal);color:var(--seal);display:grid;place-items:center;text-align:center;font-family:var(--mono);font-weight:600;line-height:1.2;letter-spacing:.06em;transform:rotate(-6deg)}
.pill{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.03em}
.pill.draft{background:#eceee8;color:var(--muted)}
.pill.review{background:#f3f0e6;color:var(--seal)}
.pill.escrow{background:#e3ede7;color:var(--pine)}
.pill.shipping{background:#e6eef4;color:#185fa5}
.pill.acceptance{background:#faeeda;color:#854f0b}
.pill.closed{background:#e3ede7;color:var(--pine-mid)}
.tm-note{font-size:12px;color:var(--seal);font-family:var(--mono);display:inline-flex;align-items:center;gap:6px}

.dhead{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#f6f8f3,var(--paper))}

.dhead .params b{color:var(--ink);font-weight:600}

.stepper{display:flex;gap:0;margin-top:24px;overflow-x:auto;padding-bottom:4px}
.step{flex:1;min-width:120px;position:relative;padding:0 8px}
.step .bar{height:4px;border-radius:2px;background:var(--line-strong)}
.step.done .bar,.step.cur .bar{background:var(--pine-mid)}

.dcols{display:grid;grid-template-columns:1fr 320px;gap:24px;padding:28px 0 60px}
.blk{margin-bottom:24px}

.timeline .ev{display:flex;gap:12px;padding-bottom:16px;position:relative}
.timeline .ev:before{content:"";position:absolute;left:5px;top:14px;bottom:-2px;width:1px;background:var(--line-strong)}

    + '<div class="tm-body" id="tmBody"></div>'
    + '<div class="tm-sugg" id="tmSugg"></div>'
    + '<div class="tm-foot"><div class="tm-inrow"><input id="tmIn" placeholder="Спросите Trademan…" aria-label="Сообщение"><button class="tm-send" id="tmSend" aria-label="Отправить">→</button></div><div class="tm-disc">Прототип · имитация. Готовит черновики — подтверждаете вы.</div></div>';
  document.body.appendChild(launch); document.body.appendChild(panel);

  var body = panel.querySelector("#tmBody"), sugg = panel.querySelector("#tmSugg"), input = panel.querySelector("#tmIn");
  function render() {
    body.innerHTML = msgs.map(function (m) {
      if (m.r === "typing") return '<div class="tm-typing">Trademan печатает…</div>';
      return '<div class="tm-msg tm-' + m.r + '">' + esc(m.t) + '</div>';
    }).join("");
    body.scrollTop = body.scrollHeight;
  }
  function renderSugg() { sugg.innerHTML = suggestions.map(function (s) { return '<button class="tm-sg">' + esc(s) + '</button>'; }).join(""); sugg.querySelectorAll(".tm-sg").forEach(function (b) { b.onclick = function () { send(b.textContent); }; }); }
  function send(text) {
    text = (text || input.value).trim(); if (!text) return; input.value = "";
    msgs.push({ r: "me", t: text }); msgs.push({ r: "typing" }); render();
    setTimeout(function () { msgs = msgs.filter(function (m) { return m.r !== "typing"; }); msgs.push({ r: "ai", t: reply(text) }); render(); }, 850);
  }
  function toggle(v) { open = v; panel.classList.toggle("open", open); if (open) setTimeout(function () { input.focus(); }, 300); }
  launch.onclick = function () { toggle(!open); };
  panel.querySelector(".x").onclick = function () { toggle(false); };
  panel.querySelector("#tmSend").onclick = function () { send(); };
  input.addEventListener("keydown", function (e) { if (e.key === "Enter") send(); });
  render(); renderSugg();
})();

</script>
